<script>

let p1 = prompt("Enter 1st name");
let p2 = prompt("Enter 2nd name");
document.getElementById("p1").innerText += p2;
document.getElementById("p2").innerText += p1;
let player = p1;
let btn = document.querySelectorAll(".btn");
let win = document.getElementById("win");
let newbtn = document.getElementById("New");
let resetbtn = document.getElementById("reset");

btn.forEach((btn) =>{
    btn.addEventListener("click", () =>{
       if(player==p1){
        console.log(p1+" was clicked");
        player = p2;
        btn.innerText = "X"
    }
    else{
        console.log(p2+" was clicked");
        player = p1;
        btn.innerText = "O"
    }
    btn.disabled = true;
    checkWinner();
    console.log(player+" is winner")
    })
})
const showWinner = (winner) => {
win.innerHTML += (" "+winner);
win.classList.remove("hide");
}

let patterns = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
]
const reset = () =>{
    for(let bt of btn){
    bt.disabled = false;
    bt.innerText = "";
    }
    win.classList.add("hide");
}
const checkWinner = () => {
for(let pat of patterns){
    console.log(btn[pat[0]].innerText, btn[pat[1]].innerText, btn[pat[2]].innerText);
    console.log(pat[0], pat[1], pat[2]);
    let pos1 = btn[pat[0]].innerText;
    let pos2 = btn[pat[1]].innerText;
    let pos3 = btn[pat[2]].innerText;
    if(pos1 != "" && pos2 != "" && pos3 != ""){
        if(pos1 == pos2 && pos2 == pos3){
            console.log("winner");
            pos1 = player;
            showWinner(pos1);
            for(let bt of btn){
                bt.disabled = true;
            }
        }
    }
}}

newbtn.addEventListener("click", reset);
